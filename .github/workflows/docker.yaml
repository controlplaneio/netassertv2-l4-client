name: Docker build and publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  GH_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GH_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: buildpush
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          push: true
          tags: |
            controlplane/netassertv2-l4-client:${{ github.ref_name }}
            controlplane/netassertv2-l4-client:latest
            ${{ env.GH_REGISTRY }}/controlplaneio/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.GH_REGISTRY }}/controlplaneio/${{ env.IMAGE_NAME }}:latest
      
      - name: Sign artifact
        run: cosign sign --yes $DIGEST_URL
        env:
          DIGEST_URL: ${{ steps.buildpush.outputs.digest }}
